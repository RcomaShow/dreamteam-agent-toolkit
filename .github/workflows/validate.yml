name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Generate adapter
        run: python scripts/sync_claude_adapter.py
      - name: Check generated drift
        run: git diff --exit-code
      - name: Validate repository
        run: python scripts/validate.py
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Benchmark preflight
        run: python scripts/measure.py
      - name: Compile runtime
        run: python -m compileall dreamteam adapters/claude-code/plugins/dreamteam
      - name: Package metadata smoke
        run: python -c "import tomllib; from pathlib import Path; data=tomllib.loads(Path('pyproject.toml').read_text()); assert data['project']['version'] == '0.4.2'; assert data['project']['dependencies'] == []"
      - name: Build release archives
        run: python scripts/build_release.py
      - name: Smoke-test plugin artifact
        run: python scripts/smoke_plugin_artifact.py dist/dreamteam-claude-code-plugin-0.4.2.zip
